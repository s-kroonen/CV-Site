name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  build-and-push:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.value }}
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        # GHCR requires a lowercase repository path; github.repository preserves
        # the repo's actual case (CV-Site), which docker/build-push-action then
        # rejects with "repository name must be lowercase". No lower() function
        # exists in GitHub Actions expression syntax, so it's done in the shell.
        run: echo "value=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.value }}:latest
            ${{ steps.image.outputs.value }}:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      # Add 'secondary' back once that host exists and its
      # SECONDARY_PORTAINER_URL/TOKEN/STACK_ID/ENDPOINT_ID secrets are set -
      # until then it would fail every run (empty secrets) and since a matrix
      # job's overall status is failure if any leg fails, that would also
      # block sync-db below via needs: deploy.
      matrix:
        host: [ primary ]
    steps:
      - name: Redeploy on ${{ matrix.host }}
        run: |
          BASE=${{ matrix.host == 'primary' && secrets.PRIMARY_PORTAINER_URL || secrets.SECONDARY_PORTAINER_URL }}
          TOKEN=${{ matrix.host == 'primary' && secrets.PRIMARY_PORTAINER_TOKEN || secrets.SECONDARY_PORTAINER_TOKEN }}
          SID=${{ matrix.host == 'primary' && secrets.PRIMARY_STACK_ID || secrets.SECONDARY_STACK_ID }}
          EID=${{ matrix.host == 'primary' && secrets.PRIMARY_ENDPOINT_ID || secrets.SECONDARY_ENDPOINT_ID }}
          curl -fsSL -X PUT \
            "$BASE/api/stacks/$SID/git/redeploy?endpointId=$EID" \
            -H "X-API-Key: $TOKEN" -H "Content-Type: application/json" \
            -d '{"PullImage": true, "Prune": false}'

  sync-db:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger DB sync on primary
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRIMARY_SSH_HOST }}
          port: ${{ secrets.PRIMARY_SSH_PORT }}
          username: sync
          key: ${{ secrets.SYNC_SSH_KEY }}
          script: "sync"        # ignored — the forced command runs /opt/sync/sync-cv-site.sh
